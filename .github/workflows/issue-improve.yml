name: Improve Issue with QAPilot

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  improve-issue:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '/improve-issue') && github.event.issue.state == 'open' && !contains(github.event.issue.body, 'QAPilot improved this issue') && github.event.action == 'created' && github.event_name == 'issue_comment' && !contains(github.event.issue.body, '/improve-issue')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          
      - name: Install dependencies
        run: |
          uv sync
          
      - name: Improve issue
        env:
          GITHUB_TOKEN: ${{ secrets.QAPILOT_GITHUB_TOKEN }}
          GITHUB_MODELS_TOKEN: ${{ secrets.QAPILOT_MODELS_TOKEN }}
          REPO_NAME: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          cd app && uv run python -m main_improve_issue
