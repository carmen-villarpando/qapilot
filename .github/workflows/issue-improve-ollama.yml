name: Improve Issue with Ollama (ZERO COST)

on:
  issues:
    types: [opened]

jobs:
  improve-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Start Ollama
        run: |
          echo "Starting Ollama container..."
          docker run -d --name ollama -v ollama:/root/.ollama -p 11434:11434 ollama/ollama
          echo "Waiting for Ollama to start..."
          sleep 30
          
      - name: Pull lightweight model
        run: |
          echo "Pulling phi3.5 model (3.8GB)..."
          docker exec ollama ollama pull phi3.5
          echo "Model pulled successfully!"
          
      - name: Wait for Ollama to be ready
        run: |
          echo "Checking Ollama status..."
          for i in {1..30}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama is ready!"
              break
            fi
            echo "Waiting for Ollama... ($i/30)"
            sleep 2
          done
          
      - name: Improve issue with Ollama
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_NAME: ${{ github.repository }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          python app/main_improve_issue_ollama.py
